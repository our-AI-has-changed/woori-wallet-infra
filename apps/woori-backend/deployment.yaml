apiVersion: apps/v1
kind: Deployment
metadata:
  name: woori-backend
  namespace: woori
  labels:
    app.kubernetes.io/name: woori-backend
    app.kubernetes.io/part-of: woori-wallet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: woori-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: woori-backend
        app.kubernetes.io/part-of: woori-wallet
    spec:
      containers:
        - name: woori-backend
          image: 655700895912.dkr.ecr.ap-northeast-2.amazonaws.com/our-ai-has-changed/woori-backend:sha-1129479
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SERVICE_MODE
              value: woori
            - name: WOORI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: woori-db-credentials
                  key: WOORI_DATABASE_URL
            - name: METRICS_ENABLED
              value: "true"
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: metrics-token
                  key: METRICS_TOKEN
          volumeMounts:
            - name: backend-env
              mountPath: /service/.env
              subPath: .env
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: backend-env
          secret:
            secretName: backend-env
            items:
              - key: .env
                path: .env
