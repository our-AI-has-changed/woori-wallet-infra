apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wallet-backend
  namespace: wallet
  labels:
    app.kubernetes.io/name: wallet-backend
    app.kubernetes.io/part-of: woori-wallet
  annotations:
    alb.ingress.kubernetes.io/group.name: woori-wallet-prd-public
    alb.ingress.kubernetes.io/group.order: "20"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: woori-wallet-prd-public
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:655700895912:certificate/807f8b40-c30e-4a90-9c88-55e3264ba5f5
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/success-codes: 200-399
    alb.ingress.kubernetes.io/actions.block-metrics: '{"type":"fixed-response","fixedResponseConfig":{"contentType":"text/plain","statusCode":"403","messageBody":"Forbidden"}}'
spec:
  ingressClassName: alb
  tls:
    - hosts:
        - wallet-api.dannis.cloud
  rules:
    - host: wallet-api.dannis.cloud
      http:
        paths:
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: block-metrics
                port:
                  name: use-annotation
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wallet-backend
                port:
                  name: http
