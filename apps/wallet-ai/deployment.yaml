apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-ai
  namespace: wallet
  labels:
    app.kubernetes.io/name: wallet-ai
    app.kubernetes.io/part-of: woori-wallet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-ai
        app.kubernetes.io/part-of: woori-wallet
    spec:
      containers:
        - name: wallet-ai
          image: 655700895912.dkr.ecr.ap-northeast-2.amazonaws.com/our-ai-has-changed/wallet-ai:sha-092219d
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: METRICS_ENABLED
              value: "true"
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: metrics-token
                  key: METRICS_TOKEN
          volumeMounts:
            - name: ai-env
              mountPath: /app/.env
              subPath: .env
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: ai-env
          secret:
            secretName: ai-env
            items:
              - key: .env
                path: .env
