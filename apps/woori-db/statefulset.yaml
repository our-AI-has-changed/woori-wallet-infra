apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: woori-db
  namespace: woori
  labels:
    app.kubernetes.io/name: woori-db
    app.kubernetes.io/part-of: woori-wallet
    app.kubernetes.io/component: database
spec:
  serviceName: woori-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: woori-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: woori-db
        app.kubernetes.io/part-of: woori-wallet
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.4.9-oraclelinux9
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: woori_auth
            - name: MYSQL_USER
              value: woori
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: woori-db-credentials
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: woori-db-credentials
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: woori-db
          app.kubernetes.io/part-of: woori-wallet
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: woori-wallet-gp3
        resources:
          requests:
            storage: 5Gi
