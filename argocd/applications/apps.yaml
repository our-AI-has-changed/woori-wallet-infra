apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: woori-wallet-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: __ARGOCD_INFRA_REPO_URL__
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
