apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wallet-backend
  namespace: monitoring
  labels:
    app.kubernetes.io/name: wallet-backend
    app.kubernetes.io/part-of: woori-wallet
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - wallet
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      authorization:
        type: Bearer
        credentials:
          name: metrics-token
          key: METRICS_TOKEN
